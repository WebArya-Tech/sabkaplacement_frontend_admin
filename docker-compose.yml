# ─────────────────────────────────────────────────────────
#  docker-compose.yml — Admin Panel Frontend (panel4)
#  Development environment with hot reload
# ─────────────────────────────────────────────────────────

version: '3.9'

services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobportal-admin-panel
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    stdin_open: true
    tty: true

networks:
  default:
    name: jobportal-network
    driver: bridge
